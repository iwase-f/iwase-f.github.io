<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Linear Scale Piano</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; font-family: sans-serif; margin-top: 50px; background-color: #f0f0f0; }
        #keyboard { position: relative; display: flex; user-select: none; touch-action: none; }
        .key { display: flex; justify-content: center; align-items: flex-end; padding-bottom: 10px; font-weight: bold; box-sizing: border-box; border-radius: 0 0 5px 5px; cursor: pointer; font-size: 1.2rem; }
        .white { width: 60px; height: 250px; background-color: white; border: 1px solid #333; color: #333; z-index: 1; }
        .white.active { background-color: #e0e0e0; }
        .black { width: 40px; height: 150px; background-color: #333; color: white; position: absolute; z-index: 2; }
        .black.active { background-color: #666; }
        .cs { left: 40px; } .ds { left: 100px; } .fs { left: 220px; } .gs { left: 280px; } .as { left: 340px; }
        .instructions { margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

    <div class="instructions">
        <h2>Linear Scale Piano (C,D 基準) 等差数列ピアノ</h2>
        <p>C4(261.63Hz)とD4の差分 Δf=32.03Hz を基準としています。</p>
    </div>

    <div id="keyboard">
        <div class="key white" id="key-a">C</div><div class="key white" id="key-s">D</div>
        <div class="key white" id="key-d"></div><div class="key white" id="key-f"></div>
        <div class="key white" id="key-g"></div><div class="key white" id="key-h"></div>
        <div class="key white" id="key-j"></div><div class="key white" id="key-k"></div>

        <div class="key black cs" id="key-w"></div><div class="key black ds" id="key-e"></div>
        <div class="key black fs" id="key-t"></div><div class="key black gs" id="key-y"></div>
        <div class="key black as" id="key-u"></div>
    </div>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx, compressor;
        const activeOscillators = {};

        const fC = 261.63; 
        const fD = 293.66; 
        const df = fD - fC;      
        const half_df = df / 2;  

        const keyMap = {
            'a': { freq: fC }, 's': { freq: fC + 1 * df }, 'd': { freq: fC + 2 * df },
            'f': { freq: fC + 3 * df }, 'g': { freq: fC + 4 * df }, 'h': { freq: fC + 5 * df },
            'j': { freq: fC + 6 * df }, 'k': { freq: fC + 7 * df },
            'w': { freq: fC + 0.5 * df }, 'e': { freq: fC + 1.5 * df },
            't': { freq: fC + 3.5 * df }, 'y': { freq: fC + 4.5 * df }, 'u': { freq: fC + 5.5 * df }
        };

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
                compressor = audioCtx.createDynamicsCompressor();
                compressor.threshold.setValueAtTime(-10, audioCtx.currentTime);
                compressor.ratio.setValueAtTime(12, audioCtx.currentTime);
                compressor.connect(audioCtx.destination);
            }
        }

        function playNote(key) {
            if (!keyMap[key] || activeOscillators[key]) return;
            initAudio();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.value = keyMap[key].freq;
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.6, audioCtx.currentTime + 0.05);
            osc.connect(gainNode); gainNode.connect(compressor); osc.start();
            activeOscillators[key] = { osc, gainNode };
            document.getElementById('key-' + key).classList.add('active');
        }

        function stopNote(key) {
            if (activeOscillators[key]) {
                const { osc, gainNode } = activeOscillators[key];
                gainNode.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.stop(audioCtx.currentTime + 0.1);
                delete activeOscillators[key];
                document.getElementById('key-' + key).classList.remove('active');
            }
        }

        window.addEventListener('keydown', (e) => { playNote(e.key.toLowerCase()); });
        window.addEventListener('keyup', (e) => { stopNote(e.key.toLowerCase()); });

        document.querySelectorAll('.key').forEach(keyElement => {
            const key = keyElement.id.split('-')[1];
            keyElement.addEventListener('pointerdown', (e) => { playNote(key); keyElement.setPointerCapture(e.pointerId); });
            keyElement.addEventListener('pointerup', (e) => { stopNote(key); keyElement.releasePointerCapture(e.pointerId); });
            keyElement.addEventListener('pointerleave', () => stopNote(key));
            keyElement.addEventListener('pointercancel', () => stopNote(key));
        });
    </script>
</body>
</html>
