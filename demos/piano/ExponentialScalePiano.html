<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Exponential Scale Piano</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            margin-top: 50px;
            background-color: #f0f0f0;
        }
        #keyboard {
            position: relative;
            display: flex;
            user-select: none;
            touch-action: none; /* スマホでのスクロールやズームを防止 */
        }
        .key {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 10px;
            font-weight: bold;
            box-sizing: border-box;
            border-radius: 0 0 5px 5px;
            cursor: pointer; /* マウス操作時に指マークにする */
        }
        .white {
            width: 60px;
            height: 250px;
            background-color: white;
            border: 1px solid #333;
            color: #333;
            z-index: 1;
        }
        .white.active {
            background-color: #e0e0e0;
        }
        .black {
            width: 40px;
            height: 150px;
            background-color: #333;
            color: white;
            position: absolute;
            z-index: 2;
        }
        .black.active {
            background-color: #666;
        }
        .cs { left: 40px; } 
        .ds { left: 100px; }
        .fs { left: 220px; }
        .gs { left: 280px; }
        .as { left: 340px; }
        
        .instructions {
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="instructions">
        <h2>Exponential Scale Piano (平均律ピアノ)</h2>
        <p>キーボード、クリック、タッチで音が鳴ります。<br>
        白鍵: A S D F G H J K<br>
        黒鍵: W E (空き) T Y U</p>
    </div>

    <div id="keyboard">
        <div class="key white" id="key-a">A (C4)</div>
        <div class="key white" id="key-s">S (D)</div>
        <div class="key white" id="key-d">D (E)</div>
        <div class="key white" id="key-f">F (F)</div>
        <div class="key white" id="key-g">G (G)</div>
        <div class="key white" id="key-h">H (A)</div>
        <div class="key white" id="key-j">J (B)</div>
        <div class="key white" id="key-k">K (C5)</div>

        <div class="key black cs" id="key-w">W</div>
        <div class="key black ds" id="key-e">E</div>
        <div class="key black fs" id="key-t">T</div>
        <div class="key black gs" id="key-y">Y</div>
        <div class="key black as" id="key-u">U</div>
    </div>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let compressor;

        const activeOscillators = {};

        const keyMap = {
            'a': { freq: 261.63, note: 'C4' },
            'w': { freq: 277.18, note: 'C#4' },
            's': { freq: 293.66, note: 'D4' },
            'e': { freq: 311.13, note: 'D#4' },
            'd': { freq: 329.63, note: 'E4' },
            'f': { freq: 349.23, note: 'F4' },
            't': { freq: 369.99, note: 'F#4' },
            'g': { freq: 392.00, note: 'G4' },
            'y': { freq: 415.30, note: 'G#4' },
            'h': { freq: 440.00, note: 'A4' },
            'u': { freq: 466.16, note: 'A#4' },
            'j': { freq: 493.88, note: 'B4' },
            'k': { freq: 523.25, note: 'C5' }
        };

        function initAudio() {
            // ① まだオーディオシステムが作られていなければ作成する
            if (!audioCtx) {
                // 古いSafari(iOS)にも対応するための記述
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
                
                compressor = audioCtx.createDynamicsCompressor();
                compressor.threshold.setValueAtTime(-10, audioCtx.currentTime);
                compressor.ratio.setValueAtTime(12, audioCtx.currentTime);
                compressor.connect(audioCtx.destination);
            }

            // ② 【追加】スマホのブラウザ制限対策
            // オーディオシステムが一時停止状態（suspended）になっていたら、強制的に再開させる
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playNote(key) {
            if (!keyMap[key] || activeOscillators[key]) return;
            initAudio();

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.value = keyMap[key].freq;

            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.6, audioCtx.currentTime + 0.05);

            osc.connect(gainNode);
            gainNode.connect(compressor);
            osc.start();

            activeOscillators[key] = { osc, gainNode };

            const keyElement = document.getElementById('key-' + key);
            if (keyElement) keyElement.classList.add('active');
        }

        function stopNote(key) {
            if (activeOscillators[key]) {
                const { osc, gainNode } = activeOscillators[key];
                
                gainNode.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.stop(audioCtx.currentTime + 0.1);

                delete activeOscillators[key];

                const keyElement = document.getElementById('key-' + key);
                if (keyElement) keyElement.classList.remove('active');
            }
        }

        // --- PCキーボード用のイベント ---
        window.addEventListener('keydown', (e) => { playNote(e.key.toLowerCase()); });
        window.addEventListener('keyup', (e) => { stopNote(e.key.toLowerCase()); });

        // --- クリック・タッチ用のイベント ---
        document.querySelectorAll('.key').forEach(keyElement => {
            const key = keyElement.id.split('-')[1]; // id(例: key-a)から'a'を取得

            keyElement.addEventListener('pointerdown', (e) => {
                playNote(key);
                keyElement.setPointerCapture(e.pointerId); // 指がズレても追跡
            });

            keyElement.addEventListener('pointerup', (e) => {
                stopNote(key);
                keyElement.releasePointerCapture(e.pointerId);
            });

            // 要素からカーソルや指が外れた場合
            keyElement.addEventListener('pointerleave', () => stopNote(key));
            keyElement.addEventListener('pointercancel', () => stopNote(key));
        });
    </script>
</body>
</html>
